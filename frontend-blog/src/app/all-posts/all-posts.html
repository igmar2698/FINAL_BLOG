<style>
  /* === KART TASARIMI === */
  .post-card { display: block; padding: 20px; border-radius: 16px; background: #121214; border: 1px solid rgba(255,255,255,0.05); text-decoration: none; color: inherit; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .post-card:hover { transform: translateY(-10px); border-color: #00e5ff; box-shadow: 0 15px 30px rgba(0, 229, 255, 0.08); }
  .post-image { width: 100%; height: 280px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; transition: transform 0.4s; }
  .post-card:hover .post-image { transform: scale(1.02); }

  /* === PENCERE (MODAL) TASARIMI === */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; opacity: 0; animation: fadeIn 0.3s forwards; }
  .modal-box { background: #121214; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); position: relative; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); transform: scale(0.9); animation: popUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
  
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes popUp { to { transform: scale(1); } }
  
  .close-btn { position: absolute; top: 20px; right: 25px; background: rgba(255,255,255,0.05); border: none; font-size: 1.5rem; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; color: #fff; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .close-btn:hover { background: #00e5ff; color: #000; transform: rotate(90deg); }
</style>

<div class="animate-fade-up" style="max-width: 1000px; margin: 60px auto; padding: 20px;">
  <a routerLink="/" style="color: #666; text-decoration: none; font-weight: 500; transition: color 0.2s;">← Ana Sayfaya Dön</a>
  <h1 style="font-size: 3rem; margin: 20px 0 40px 0; color: #fff;">Tüm Yazılarım</h1>

  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px;">
    <div *ngFor="let post of posts" class="post-card" (click)="openPost(post)">
      <div style="overflow: hidden; border-radius: 12px; margin-bottom: 15px;">
        <img *ngIf="post.image" [src]="post.image" class="post-image">
      </div>
      <span style="font-size: 0.75rem; font-weight: 700; color: #00e5ff; letter-spacing: 1px; text-transform: uppercase;">İçerik</span>
      <h3 style="margin: 10px 0; font-size: 1.4rem; color: #fff; line-height: 1.3;">{{ post.title }}</h3>
    </div>
  </div>

  <div *ngIf="posts.length === 0" style="text-align: center; padding: 50px; background: #121214; border-radius: 16px; border: 1px dashed rgba(255,255,255,0.1);">
    <p style="color: #888; font-style: italic; font-size: 1.2rem;">Sisteme yüklenmiş bir veri bulunamadı.</p>
  </div>
</div>

<div *ngIf="selectedPost" class="modal-overlay" (click)="closePost()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closePost()">✕</button>
    
    <h1 style="font-size: 2.2rem; margin-top: 0; margin-bottom: 25px; color: #fff; line-height: 1.2; padding-right: 40px;">{{ selectedPost.title }}</h1>
    
    <img *ngIf="selectedPost.image" [src]="selectedPost.image" style="width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);">
    
    <div style="font-size: 1.1rem; line-height: 1.8; color: #ccc; white-space: pre-wrap; font-weight: 300;">{{ selectedPost.content }}</div>
  </div>
</div>
