<div class="about-card" *ngIf="aboutData.name_surname" style="max-width: 800px; margin: 60px auto; padding: 20px;">
  
  <div style="text-align: center; margin-bottom: 20px;" *ngIf="aboutData.photo">
    <img [src]="aboutData.photo.includes('http') ? aboutData.photo : 'https://final-blog-4p56.onrender.com' + aboutData.photo" 
         alt="Profil Fotoğrafı" 
         style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid #00e5ff;">
  </div>

  <h1 style="font-size: 2.5rem; margin-top: 0; margin-bottom: 20px; color: #fff;">Hakkımda</h1>
  
  <p style="color: #bbb; font-size: 1.1rem; line-height: 1.8;">
    Selam, ben <strong>{{ aboutData.name_surname }}</strong>.
  </p>
  
  <p style="color: #bbb; font-size: 1.1rem; line-height: 1.8;">
    {{ aboutData.city }}'de yaşıyorum. {{ aboutData.age }} yaşındayım ve {{ aboutData.profession }} olarak çalışıyorum.
  </p>

  <p style="color: #bbb; font-size: 1.1rem; line-height: 1.8;">
    {{ aboutData.description }}
  </p>

  <h3 style="margin-top: 40px; color: #fff; font-size: 1.5rem;">Bağlantılarım</h3>
  <ul>
    <li>
      <a [href]="aboutData.linkedin_url" target="_blank" style="color: #00e5ff; text-decoration: none;">
        <strong>LinkedIn Profilim</strong>
      </a>
    </li>
    <li>
      <a [href]="aboutData.github_url" target="_blank" style="color: #00e5ff; text-decoration: none;">
        <strong>GitHub Profilim</strong>
      </a>
    </li>
  </ul>
</div>
